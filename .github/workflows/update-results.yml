name: Update World Cup results

on:
  schedule:
    # Twice daily (UTC): 06:30 and 21:30. Results come from ESPN's free public
    # API, so there's no key or quota to worry about. Add/adjust cron lines to
    # refresh more often during the tournament.
    - cron: "30 6 * * *"
    - cron: "30 21 * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write          # needed to commit results.json back to the repo

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch results
        run: node scripts/fetch-results.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain results.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add results.json
            git commit -m "Update results ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "No results change to commit."
          fi
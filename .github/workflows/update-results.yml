name: Update World Cup results

on:
  # The tournament is over, so the scheduled auto-updates are turned off.
  # (To re-enable, add back a `schedule:` block with cron lines, e.g.
  #  `- cron: "17 6 * * *"`.) The workflow can still be run by hand from the
  # Actions tab if results ever need refreshing.
  workflow_dispatch: {}

permissions:
  contents: write          # needed to commit results.json back to the repo

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch results
        run: node scripts/fetch-results.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain results.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add results.json
            git commit -m "Update results ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "No results change to commit."
          fi
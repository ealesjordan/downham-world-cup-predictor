name: Update World Cup results

on:
  schedule:
    # Times are UTC. GitHub runs scheduled workflows on a BEST-EFFORT basis and
    # delays them heavily at congested times — the top of the hour, ":30", and
    # the ~06:00 UTC window are the most oversubscribed slots, which is why a
    # plain "30 6 * * *" was consistently landing 3-6 hours late. To get a run
    # near the morning target we (a) use off-peak minutes (:17) and (b) fire a
    # couple of staggered morning attempts. Extra runs are harmless: the commit
    # step only commits when results.json changes and the concurrency group
    # below prevents overlap. ESPN's free public API has no key or quota.
    - cron: "17 5 * * *"    # early morning attempt
    - cron: "17 6 * * *"    # morning target (~06:17 UTC)
    - cron: "17 8 * * *"    # backup if the earlier two are delayed/dropped
    - cron: "17 21 * * *"   # evening
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write          # needed to commit results.json back to the repo

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch results
        run: node scripts/fetch-results.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain results.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add results.json
            git commit -m "Update results ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "No results change to commit."
          fi
"use strict";

/* ----------------------------------------------------------------
   DOWNHAM TOWN FC — WORLD CUP 2026 GROUP-STAGE PREDICTOR
   Runs fully in the browser. No accounts, no backend.
   Each person's progress is saved on their own device (localStorage),
   and they send their entry to the organiser via WhatsApp.

   ▸ Edit fixtures/dates in GROUPS and GROUP_DATES below.
   ▸ The six matchups per group are correct (every team plays every
     other once). Matchday 1 home/away matches the official fixtures;
     MD2/MD3 ordering is best-effort — check BBC Sport if you want it
     exact. It doesn't affect scoring, only how lines read.
---------------------------------------------------------------- */

var GROUPS = {

  B: ["Canada", "Bosnia & Herzegovina", "Qatar", "Switzerland"],

};
var GROUP_DATES = {
  A: ["11 Jun", "18 Jun", "24 Jun"], B: ["12 Jun", "18 Jun", "24 Jun"],
  C: ["13 Jun", "19 Jun", "25 Jun"], D: ["13 Jun", "19 Jun", "25 Jun"],
  E: ["14 Jun", "20 Jun", "26 Jun"], F: ["14 Jun", "20 Jun", "26 Jun"],
  G: ["15 Jun", "21 Jun", "26 Jun"], H: ["15 Jun", "21 Jun", "26 Jun"],
  I: ["16 Jun", "21 Jun", "26 Jun"], J: ["16 Jun", "22 Jun", "26 Jun"],
  K: ["17 Jun", "22 Jun", "27 Jun"], L: ["17 Jun", "23 Jun", "27 Jun"]
};
var FLAGS = {
  "Mexico":"🇲🇽","South Africa":"🇿🇦","South Korea":"🇰🇷","Czechia":"🇨🇿",
  "Canada":"🇨🇦","Bosnia & Herzegovina":"🇧🇦","Qatar":"🇶🇦","Switzerland":"🇨🇭",
  "Brazil":"🇧🇷","Morocco":"🇲🇦","Haiti":"🇭🇹","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿",
  "USA":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺","Turkey":"🇹🇷",
  "Germany":"🇩🇪","Curaçao":"🇨🇼","Ivory Coast":"🇨🇮","Ecuador":"🇪🇨",
  "Netherlands":"🇳🇱","Japan":"🇯🇵","Sweden":"🇸🇪","Tunisia":"🇹🇳",
  "Belgium":"🇧🇪","Egypt":"🇪🇬","Iran":"🇮🇷","New Zealand":"🇳🇿",
  "Spain":"🇪🇸","Cabo Verde":"🇨🇻","Uruguay":"🇺🇾","Saudi Arabia":"🇸🇦",
  "France":"🇫🇷","Senegal":"🇸🇳","Norway":"🇳🇴","Iraq":"🇮🇶",
  "Argentina":"🇦🇷","Algeria":"🇩🇿","Austria":"🇦🇹","Jordan":"🇯🇴",
  "Portugal":"🇵🇹","DR Congo":"🇨🇩","Uzbekistan":"🇺🇿","Colombia":"🇨🇴",
  "England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croatia":"🇭🇷","Ghana":"🇬🇭","Panama":"🇵🇦"
};
var ROTATION = [ [[0,1],[2,3]], [[0,2],[3,1]], [[3,0],[1,2]] ];

function buildMatches(){
  var out = [];
  Object.keys(GROUPS).forEach(function(g){
    var t = GROUPS[g];
    ROTATION.forEach(function(day, di){
      day.forEach(function(pair, mi){
        out.push({ id:g+"-"+(di+1)+"-"+mi, group:g, matchday:di+1,
          date:GROUP_DATES[g][di], home:t[pair[0]], away:t[pair[1]] });
      });
    });
  });
  return out;
}
var MONTH = { Jun:6, Jul:7 };
function dkey(d){ var p=d.split(" "); return MONTH[p[1]]*100 + parseInt(p[0],10); }
var MATCHES = buildMatches().sort(function(a,b){ return dkey(a.date)-dkey(b.date) || a.group.localeCompare(b.group); });
var TOTAL = MATCHES.length;
var ALL_TEAMS = (function(){ var a=[]; Object.keys(GROUPS).forEach(function(g){ GROUPS[g].forEach(function(t){ a.push(t); }); }); a.sort(); return a; })();

/* ---------------------- knockout structure ---------------------- */
/* Official 2026 Round-of-32 pairings (Matches 73–88). t: W=winner, RU=runner-up, 3=best third (by cluster slot). */
var R32DEF = [
  { m:73, a:{t:"RU",g:"A"}, b:{t:"RU",g:"B"} },
  { m:74, a:{t:"W",g:"E"},  b:{t:"3",slot:74} },
  { m:75, a:{t:"W",g:"F"},  b:{t:"RU",g:"C"} },
  { m:76, a:{t:"W",g:"C"},  b:{t:"RU",g:"F"} },
  { m:77, a:{t:"W",g:"I"},  b:{t:"3",slot:77} },
  { m:78, a:{t:"RU",g:"E"}, b:{t:"RU",g:"I"} },
  { m:79, a:{t:"W",g:"A"},  b:{t:"3",slot:79} },
  { m:80, a:{t:"W",g:"L"},  b:{t:"3",slot:80} },
  { m:81, a:{t:"W",g:"D"},  b:{t:"3",slot:81} },
  { m:82, a:{t:"W",g:"G"},  b:{t:"3",slot:82} },
  { m:83, a:{t:"RU",g:"K"}, b:{t:"RU",g:"L"} },
  { m:84, a:{t:"W",g:"H"},  b:{t:"RU",g:"J"} },
  { m:85, a:{t:"W",g:"B"},  b:{t:"3",slot:85} },
  { m:86, a:{t:"W",g:"J"},  b:{t:"RU",g:"H"} },
  { m:87, a:{t:"W",g:"K"},  b:{t:"3",slot:87} },
  { m:88, a:{t:"RU",g:"D"}, b:{t:"RU",g:"G"} }
];
var THIRD_CLUSTERS = {
  74:["A","B","C","D","F"], 77:["C","D","F","G","H"], 79:["C","E","F","H","I"],
  80:["E","H","I","J","K"], 81:["B","E","F","I","J"], 82:["A","E","H","I","J"],
  85:["E","F","G","I","J"], 87:["D","E","I","J","L"]
};
var LATERDEF = [
  {m:89,a:74,b:77},{m:90,a:73,b:75},{m:91,a:76,b:78},{m:92,a:79,b:80},
  {m:93,a:83,b:84},{m:94,a:81,b:82},{m:95,a:86,b:88},{m:96,a:85,b:87},
  {m:97,a:89,b:90},{m:98,a:93,b:94},{m:99,a:91,b:92},{m:100,a:95,b:96},
  {m:101,a:97,b:98},{m:102,a:99,b:100},{m:103,a:101,b:102}
];
var LATERMAP = {}; LATERDEF.forEach(function(d){ LATERMAP[d.m]=d; });
var ALLNOS = []; for (var _i=73;_i<=103;_i++) ALLNOS.push(_i);
var KO_ROUNDS = [
  { key:"R32", label:"Round of 32",   matches:[73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88] },
  { key:"R16", label:"Round of 16",   matches:[89,90,91,92,93,94,95,96] },
  { key:"QF",  label:"Quarter-finals",matches:[97,98,99,100] },
  { key:"SF",  label:"Semi-finals",   matches:[101,102] },
  { key:"F",   label:"Final",         matches:[103] }
];
var KO_TOTAL = 31;

function cmpTeam(x,y){ return y.pts-x.pts || y.gd-x.gd || y.gf-x.gf || x.team.localeCompare(y.team); }

function computeTables(preds){
  var tables = {};
  Object.keys(GROUPS).forEach(function(g){
    var stat = {};
    GROUPS[g].forEach(function(t){ stat[t]={team:t,group:g,pts:0,gf:0,ga:0,gd:0,played:0}; });
    MATCHES.filter(function(m){ return m.group===g; }).forEach(function(m){
      var p = preds[m.id]; if (!p || p.h==="" || p.a==="") return;
      var h=parseInt(p.h,10), a=parseInt(p.a,10), H=stat[m.home], A=stat[m.away];
      H.gf+=h; H.ga+=a; A.gf+=a; A.ga+=h; H.played++; A.played++;
      if (h>a) H.pts+=3; else if (h<a) A.pts+=3; else { H.pts++; A.pts++; }
    });
    var arr = GROUPS[g].map(function(t){ var s=stat[t]; s.gd=s.gf-s.ga; return s; });
    arr.sort(cmpTeam);
    tables[g]=arr;
  });
  return tables;
}
function assignThirds(qualGroups){
  var slots=[74,77,79,80,81,82,85,87], assign={}, used={};
  var order=slots.slice().sort(function(a,b){
    function n(s){ return THIRD_CLUSTERS[s].filter(function(g){return qualGroups.indexOf(g)>=0;}).length; }
    return n(a)-n(b);
  });
  function solve(i){
    if (i===order.length) return true;
    var slot=order[i];
    var dom=THIRD_CLUSTERS[slot].filter(function(g){ return qualGroups.indexOf(g)>=0 && !used[g]; });
    for (var k=0;k<dom.length;k++){ assign[slot]=dom[k]; used[dom[k]]=true; if (solve(i+1)) return true; used[dom[k]]=false; delete assign[slot]; }
    return false;
  }
  if (solve(0)) return assign;
  var fb={}, u={}; slots.forEach(function(s){ for (var j=0;j<qualGroups.length;j++){ if(!u[qualGroups[j]]){ fb[s]=qualGroups[j]; u[qualGroups[j]]=true; break; } } });
  return fb;
}
function r32team(ref, tables, thirdBySlot){
  if (ref.t==="W")  return tables[ref.g][0].team;
  if (ref.t==="RU") return tables[ref.g][1].team;
  if (ref.t==="3")  return thirdBySlot[ref.slot] || null;
  return null;
}
/* Returns { tables, qualThirds, thirdBySlot, teams:{matchNo:[a,b]} } and prunes invalid winners in place. */
function computeBracket(preds, winners){
  var tables = computeTables(preds);
  var thirds = Object.keys(GROUPS).map(function(g){ return tables[g][2]; }).slice().sort(cmpTeam);
  var qualThirds = thirds.slice(0,8);
  var qualGroups = qualThirds.map(function(s){ return s.group; });
  var slotAssign = assignThirds(qualGroups);
  var thirdBySlot = {}; Object.keys(slotAssign).forEach(function(s){ thirdBySlot[s]=tables[slotAssign[s]][2].team; });

  var teams = {}, defByNo = {};
  R32DEF.forEach(function(d){ defByNo[d.m]=d; teams[d.m]=[ r32team(d.a,tables,thirdBySlot), r32team(d.b,tables,thirdBySlot) ]; });
  ALLNOS.forEach(function(no){
    if (no>88){ var d=LATERMAP[no]; teams[no]=[ winners[d.a]||null, winners[d.b]||null ]; }
    var w=winners[no];
    if (w!=null){ var t=teams[no]; if (!t || (t[0]!==w && t[1]!==w)) delete winners[no]; }
  });
  return { tables:tables, qualThirds:qualThirds, thirdBySlot:thirdBySlot, teams:teams };
}
function koPicked(winners){ var n=0; ALLNOS.forEach(function(no){ if(winners[no]) n++; }); return n; }

/* --------------------------- leaderboard --------------------------- */
/* Points config — EDIT HERE. Knockout values aren't in the original rules,
   so these are sensible defaults; change them to whatever you agree. */
var SCORING = {
  exact: 5, result: 2,        // group score: exact / correct result
  qualifier: 10,              // each correct team reaching the Round of 32
  winner: 25, topScorer: 25,  // pre-tournament winner / Golden Boot
  ko: { R32: 10, R16: 15, QF: 20, SF: 25, F: 30 } // each correct knockout-round winner
};
function normName(s){ return String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9]/g,""); }
function pairKey(a,b){ return [normName(a),normName(b)].sort().join("|"); }

function indexResults(R){
  var idx = {};
  (R.groupScores||[]).forEach(function(g){ idx[pairKey(g.home,g.away)] = g; });
  R._pairIndex = idx; return R;
}
function scoreEntry(entry, R){
  var preds = entry.predictions||{}, w = entry.knockout||{};
  var bd = { group:0, qualifiers:0, ko:0, winner:0, topScorer:0 };

  MATCHES.forEach(function(m){
    var p = preds[m.id]; if(!p || p.h===""||p.a==="") return;
    var act = R._pairIndex[pairKey(m.home,m.away)]; if(!act) return;
    var ah, aa;
    if (normName(act.home)===normName(m.home)){ ah=+act.h; aa=+act.a; } else { ah=+act.a; aa=+act.h; }
    var ph=+p.h, pa=+p.a;
    if (ph===ah && pa===aa) bd.group += SCORING.exact;
    else if (Math.sign(ph-pa)===Math.sign(ah-aa)) bd.group += SCORING.result;
  });

  if (R.qualifiedR32 && R.qualifiedR32.length===32){
    var br = computeBracket(preds, {});
    var predQ = {};
    Object.keys(GROUPS).forEach(function(g){ predQ[normName(br.tables[g][0].team)]=1; predQ[normName(br.tables[g][1].team)]=1; });
    br.qualThirds.forEach(function(s){ predQ[normName(s.team)]=1; });
    R.qualifiedR32.forEach(function(t){ if(predQ[normName(t)]) bd.qualifiers += SCORING.qualifier; });
  }

  if (R.champion && entry.winner && normName(entry.winner)===normName(R.champion)) bd.winner += SCORING.winner;

  if (R.topScorers && R.topScorers.length && entry.topScorer){
    var maxG = R.topScorers[0].goals;
    var leaders = R.topScorers.filter(function(s){ return s.goals===maxG; }).map(function(s){ return normName(s.name); });
    if (leaders.indexOf(normName(entry.topScorer))>=0) bd.topScorer += SCORING.topScorer;
  }

  KO_ROUNDS.forEach(function(r){
    var adv = (R.advancers && R.advancers[r.key]) || []; if(!adv.length) return;
    var advN = {}; adv.forEach(function(t){ advN[normName(t)]=1; });
    r.matches.forEach(function(no){ var t=w[no]; if(t && advN[normName(t)]) bd.ko += (SCORING.ko[r.key]||0); });
  });

  var total = bd.group+bd.qualifiers+bd.ko+bd.winner+bd.topScorer;
  return { points: total, bd: bd };
}
function loadJSON(path){

}

var LS_PREFIX = "dtfc-wc26:";
function nkey(name){ return LS_PREFIX + name.trim().toLowerCase().replace(/\s+/g," "); }
function safeGet(k){ try { return localStorage.getItem(k); } catch(e){ return null; } }
function safeSet(k,v){ try { localStorage.setItem(k,v); } catch(e){} }

/* ----------------------------- state ---------------------------- */
var state = { screen:"welcome", name:"", category:"Adult", winner:"", topScorer:"", predictions:{}, knockout:{}, tab:"group", fGroup:"all", fMd:"all", saved:"" };
var saveTimer = null;

function loadEntry(name){
  var raw = safeGet(nkey(name));
  if (raw){ try { var d = JSON.parse(raw); return { category:d.category||"Adult", winner:d.winner||"", topScorer:d.topScorer||"", predictions:d.predictions||{}, knockout:d.knockout||{} }; } catch(e){} }
  return { category:"Adult", winner:"", topScorer:"", predictions:{}, knockout:{} };
}
function persist(){
  if (!state.name) return;
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    safeSet(nkey(state.name), JSON.stringify({
      name:state.name, category:state.category, winner:state.winner, topScorer:state.topScorer, predictions:state.predictions, knockout:state.knockout, updatedAt:new Date().toISOString()
    }));
    safeSet(LS_PREFIX+"last", state.name);
    var t = new Date();
    state.saved = t.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    var s = document.getElementById("saved"); if (s) s.textContent = "Saved ✓ " + state.saved;
  }, 250);
}
function doneCount(){
  var n=0; for (var i=0;i<MATCHES.length;i++){ var p=state.predictions[MATCHES[i].id]; if(p&&p.h!==""&&p.a!=="") n++; } return n;
}

/* --------------------------- WhatsApp --------------------------- */
function buildWhatsApp(entry){
  var name=entry.name, category=entry.category, preds=entry.predictions||{}, winners=entry.knockout||{};
  var L = [];
  L.push("⚽ *World Cup 2026 — Downham Town FC*");
  L.push("Entry: *" + name + "*" + (category==="Under 12" ? "  _(Under-12s)_" : ""));
  L.push("");
  L.push("🏆 *Winner:* " + (entry.winner || "_(not chosen yet)_"));
  L.push("👟 *Top scorer:* " + (entry.topScorer || "_(not chosen yet)_"));

  var total = 0;
  for (var d=1; d<=3; d++){
    var day = MATCHES.filter(function(m){ return m.matchday===d; })
      .filter(function(m){ var p=preds[m.id]; return p&&p.h!==""&&p.a!==""; });
    if (!day.length) continue;
    L.push(""); L.push("*Matchday " + d + "*");
    day.forEach(function(m){ var p=preds[m.id]; L.push(m.home + " " + p.h + " - " + p.a + " " + m.away); total++; });
  }
  L.push("");
  L.push(total ? ("_" + total + " of " + TOTAL + " group matches predicted_") : "_No predictions filled in yet_");

  // Once every group match is in, list the 32 qualifiers
  if (total === TOTAL){
    var br = computeBracket(preds, {});
    L.push(""); L.push("*Teams through to the Round of 32* (32)");
    Object.keys(GROUPS).forEach(function(g){
      L.push(g + ": " + br.tables[g][0].team + ", " + br.tables[g][1].team);
    });
    L.push("Best 3rd-placed: " + br.qualThirds.map(function(s){ return s.team; }).join(", "));
  }

  if (koPicked(winners) > 0){
    L.push(""); L.push("*— Knockout predictions —*");
    KO_ROUNDS.forEach(function(r){
      if (r.key==="F") return;
      var ws = r.matches.map(function(n){ return winners[n]; }).filter(Boolean);
      if (ws.length){ L.push(""); L.push("*" + r.label + " winners*"); L.push(ws.join(", ")); }
    });
    if (winners[103]){ L.push(""); L.push("🏆 *Champion: " + winners[103] + "*"); }
  }
  return L.join("\n");
}
function copyText(text){
  return new Promise(function(resolve){
    function fallback(){
      try { var ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
        document.body.appendChild(ta); ta.focus(); ta.select(); var ok=document.execCommand("copy");
        document.body.removeChild(ta); resolve(ok); } catch(e){ resolve(false); }
    }
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){resolve(true);}, fallback);
    } else fallback();
  });
}
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

    '</div>';
  document.getElementById("lb-back").addEventListener("click", showWelcome);
  Promise.all([loadJSON("predictions.json"), loadJSON("results.json")]).then(function(res){
    renderLeaderboard(res[0], res[1]);
  });
}
function renderLeaderboard(preds, results){
  var body=document.getElementById("lb-body"); if(!body) return;
  if(!preds || !preds.length){
    body.innerHTML = '<div class="ticket" style="padding:18px;margin-top:14px;"><p>No entries yet. Once predictions are added to <code>predictions.json</code> in the repo, the table appears here automatically.</p></div>';
    return;
  }
  var R = indexResults(results || { groupScores:[], advancers:{} });
  var rows = preds.map(function(e){ return { e:e, s:scoreEntry(e,R) }; });
  rows.sort(function(a,b){ return b.s.points-a.s.points || (a.e.name||"").localeCompare(b.e.name||""); });

  var updated = (results && results.updatedAt) ? new Date(results.updatedAt).toLocaleString() : "no results yet";
  var played = (results && results.groupScores) ? results.groupScores.length : 0;

  var html = '<p class="muted" style="font-size:12px;margin:8px 0 14px;">Results updated: '+esc(updated)+' · '+played+' group matches in</p><div style="display:grid;gap:8px;">';
  rows.forEach(function(r,i){
    var medal = i===0?"🥇":i===1?"🥈":i===2?"🥉":("#"+(i+1));
    html += '<button class="ticket lb-row" data-i="'+i+'" style="text-align:left;padding:12px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;background:#fff;">' +
      '<span class="flex ac g8"><span style="font-family:\'Anton\',sans-serif;font-size:18px;min-width:34px;">'+medal+'</span>' +
      '<span style="font-weight:700;">'+esc(r.e.name||"?")+(r.e.category==="Under 12"?' <span class="md-pill">U12</span>':'')+'</span></span>' +
      '<span style="font-family:\'Anton\',sans-serif;font-size:20px;color:var(--red);">'+r.s.points+'<span style="font-size:11px;color:#9a8d70;"> pts</span></span>' +
      '</button>';
  });
  html += '</div><p class="muted" style="font-size:11px;margin-top:14px;">Tap anyone to see their predictions and points breakdown.</p>';
  body.innerHTML = html;
  body.querySelectorAll(".lb-row").forEach(function(btn){
    btn.addEventListener("click", function(){ openPersonModal(rows[+btn.getAttribute("data-i")]); });
  });
}
function openPersonModal(row){
  var e=row.e, bd=row.s.bd;
  var br = computeBracket(e.predictions||{}, {});
  var q=[]; Object.keys(GROUPS).forEach(function(g){ q.push(br.tables[g][0].team, br.tables[g][1].team); }); br.qualThirds.forEach(function(s){ q.push(s.team); });
  var lines = MATCHES.filter(function(m){ var p=(e.predictions||{})[m.id]; return p&&p.h!==""&&p.a!==""; })
     .map(function(m){ var p=e.predictions[m.id]; return m.home+" "+p.h+"–"+p.a+" "+m.away; });
  var koLines = KO_ROUNDS.filter(function(r){ return r.key!=="F"; }).map(function(r){
     var ws=r.matches.map(function(no){ return (e.knockout||{})[no]; }).filter(Boolean);
     return ws.length ? (r.label+": "+ws.join(", ")) : null;
  }).filter(Boolean);
  var champ=(e.knockout||{})[103];

  var html='<div class="flex ac jb" style="margin-bottom:8px;"><div class="display" style="font-size:20px;color:var(--red);">'+esc(e.name||"?")+'</div><button class="link" id="pm-close">Close</button></div>';
  html+='<div style="overflow:auto;">';
  html+='<div class="ticket" style="padding:12px 14px;margin-bottom:10px;font-size:14px;">🏆 Winner: <strong>'+esc(e.winner||"—")+'</strong> &nbsp;·&nbsp; 👟 Top scorer: <strong>'+esc(e.topScorer||"—")+'</strong>'+(champ?'<div style="margin-top:4px;">Predicted champion (bracket): <strong>'+esc(champ)+'</strong></div>':'')+'</div>';
  html+='<div class="ticket" style="padding:12px 14px;margin-bottom:10px;font-size:13px;"><div style="font-weight:700;margin-bottom:6px;">Points: '+row.s.points+'</div>Group scores '+bd.group+' · Qualifiers '+bd.qualifiers+' · Knockouts '+bd.ko+' · Winner '+bd.winner+' · Top scorer '+bd.topScorer+'</div>';
  html+='<div class="ticket" style="padding:12px 14px;margin-bottom:10px;font-size:13px;"><div style="font-weight:700;margin-bottom:6px;">Predicted Round of 32 (32)</div>'+esc(q.join(", "))+'</div>';
  if(koLines.length) html+='<div class="ticket" style="padding:12px 14px;margin-bottom:10px;font-size:13px;"><div style="font-weight:700;margin-bottom:6px;">Knockout picks</div>'+esc(koLines.join(" · "))+'</div>';
  html+='<div class="ticket" style="padding:12px 14px;font-size:13px;"><div style="font-weight:700;margin-bottom:6px;">Group scorelines ('+lines.length+')</div>'+(lines.length?esc(lines.join("  ·  ")):'<span class="muted">none yet</span>')+'</div>';
  html+='</div>';

  var ov=document.createElement("div"); ov.className="overlay";
  var sheet=document.createElement("div"); sheet.className="sheet pop"; sheet.innerHTML=html;
  ov.appendChild(sheet); document.body.appendChild(ov);
  function close(){ document.body.removeChild(ov); }
  ov.addEventListener("click", function(ev){ if(ev.target===ov) close(); });
  sheet.querySelector("#pm-close").addEventListener("click", close);
}

/* ----------------------------- init ----------------------------- */
document.getElementById("home-crest").addEventListener("click", function(){ persistNow(); showWelcome(); });
document.getElementById("home-title").addEventListener("click", function(){ persistNow(); showWelcome(); });
showWelcome();
</script>

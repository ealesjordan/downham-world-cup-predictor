<script>
"use strict";

/* ----------------------------------------------------------------
   DOWNHAM TOWN FC — WORLD CUP 2026 GROUP-STAGE PREDICTOR
   Runs fully in the browser. No accounts, no backend.
   Each person's progress is saved on their own device (localStorage),
   and they send their entry to the organiser via WhatsApp.

   ▸ Edit fixtures/dates in GROUPS and GROUP_DATES below.
   ▸ The six matchups per group are correct (every team plays every
     other once). Matchday 1 home/away matches the official fixtures;
     MD2/MD3 ordering is best-effort — check BBC Sport if you want it
     exact. It doesn't affect scoring, only how lines read.
---------------------------------------------------------------- */

var GROUPS = {

  E: ["14 Jun", "20 Jun", "26 Jun"], F: ["14 Jun", "20 Jun", "26 Jun"],
  G: ["15 Jun", "21 Jun", "26 Jun"], H: ["15 Jun", "21 Jun", "26 Jun"],
  I: ["16 Jun", "21 Jun", "26 Jun"], J: ["16 Jun", "22 Jun", "26 Jun"],

};
var FLAGS = {
  "Mexico":"🇲🇽","South Africa":"🇿🇦","South Korea":"🇰🇷","Czechia":"🇨🇿",
  "Canada":"🇨🇦","Bosnia & Herzegovina":"🇧🇦","Qatar":"🇶🇦","Switzerland":"🇨🇭",
  "Brazil":"🇧🇷","Morocco":"🇲🇦","Haiti":"🇭🇹","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿",
  "USA":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺","Turkey":"🇹🇷",
  "Germany":"🇩🇪","Curaçao":"🇨🇼","Ivory Coast":"🇨🇮","Ecuador":"🇪🇨",
  "Netherlands":"🇳🇱","Japan":"🇯🇵","Sweden":"🇸🇪","Tunisia":"🇹🇳",
  "Belgium":"🇧🇪","Egypt":"🇪🇬","Iran":"🇮🇷","New Zealand":"🇳🇿",
  "Spain":"🇪🇸","Cabo Verde":"🇨🇻","Uruguay":"🇺🇾","Saudi Arabia":"🇸🇦",
  "France":"🇫🇷","Senegal":"🇸🇳","Norway":"🇳🇴","Iraq":"🇮🇶",
  "Argentina":"🇦🇷","Algeria":"🇩🇿","Austria":"🇦🇹","Jordan":"🇯🇴",
  "Portugal":"🇵🇹","DR Congo":"🇨🇩","Uzbekistan":"🇺🇿","Colombia":"🇨🇴",
  "England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croatia":"🇭🇷","Ghana":"🇬🇭","Panama":"🇵🇦"
};
var ROTATION = [ [[0,1],[2,3]], [[0,2],[3,1]], [[3,0],[1,2]] ];

function buildMatches(){
  var out = [];
  Object.keys(GROUPS).forEach(function(g){
    var t = GROUPS[g];
    ROTATION.forEach(function(day, di){
      day.forEach(function(pair, mi){
        out.push({ id:g+"-"+(di+1)+"-"+mi, group:g, matchday:di+1,
          date:GROUP_DATES[g][di], home:t[pair[0]], away:t[pair[1]] });
      });
    });
  });
  return out;
}
var MONTH = { Jun:6, Jul:7 };
function dkey(d){ var p=d.split(" "); return MONTH[p[1]]*100 + parseInt(p[0],10); }
var MATCHES = buildMatches().sort(function(a,b){ return dkey(a.date)-dkey(b.date) || a.group.localeCompare(b.group); });
var TOTAL = MATCHES.length;
var ALL_TEAMS = (function(){ var a=[]; Object.keys(GROUPS).forEach(function(g){ GROUPS[g].forEach(function(t){ a.push(t); }); }); a.sort(); return a; })();

/* ---------------------- knockout structure ---------------------- */
/* Official 2026 Round-of-32 pairings (Matches 73–88). t: W=winner, RU=runner-up, 3=best third (by cluster slot). */
var R32DEF = [
  { m:73, a:{t:"RU",g:"A"}, b:{t:"RU",g:"B"} },
  { m:74, a:{t:"W",g:"E"},  b:{t:"3",slot:74} },
  { m:75, a:{t:"W",g:"F"},  b:{t:"RU",g:"C"} },
  { m:76, a:{t:"W",g:"C"},  b:{t:"RU",g:"F"} },
  { m:77, a:{t:"W",g:"I"},  b:{t:"3",slot:77} },
  { m:78, a:{t:"RU",g:"E"}, b:{t:"RU",g:"I"} },
  { m:79, a:{t:"W",g:"A"},  b:{t:"3",slot:79} },
  { m:80, a:{t:"W",g:"L"},  b:{t:"3",slot:80} },
  { m:81, a:{t:"W",g:"D"},  b:{t:"3",slot:81} },
  { m:82, a:{t:"W",g:"G"},  b:{t:"3",slot:82} },
  { m:83, a:{t:"RU",g:"K"}, b:{t:"RU",g:"L"} },
  { m:84, a:{t:"W",g:"H"},  b:{t:"RU",g:"J"} },
  { m:85, a:{t:"W",g:"B"},  b:{t:"3",slot:85} },
  { m:86, a:{t:"W",g:"J"},  b:{t:"RU",g:"H"} },
  { m:87, a:{t:"W",g:"K"},  b:{t:"3",slot:87} },
  { m:88, a:{t:"RU",g:"D"}, b:{t:"RU",g:"G"} }
];
var THIRD_CLUSTERS = {
  74:["A","B","C","D","F"], 77:["C","D","F","G","H"], 79:["C","E","F","H","I"],
  80:["E","H","I","J","K"], 81:["B","E","F","I","J"], 82:["A","E","H","I","J"],
  85:["E","F","G","I","J"], 87:["D","E","I","J","L"]
};
var LATERDEF = [
  {m:89,a:74,b:77},{m:90,a:73,b:75},{m:91,a:76,b:78},{m:92,a:79,b:80},
  {m:93,a:83,b:84},{m:94,a:81,b:82},{m:95,a:86,b:88},{m:96,a:85,b:87},
  {m:97,a:89,b:90},{m:98,a:93,b:94},{m:99,a:91,b:92},{m:100,a:95,b:96},
  {m:101,a:97,b:98},{m:102,a:99,b:100},{m:103,a:101,b:102}
];
var LATERMAP = {}; LATERDEF.forEach(function(d){ LATERMAP[d.m]=d; });
var ALLNOS = []; for (var _i=73;_i<=103;_i++) ALLNOS.push(_i);
var KO_ROUNDS = [
  { key:"R32", label:"Round of 32",   matches:[73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88] },
  { key:"R16", label:"Round of 16",   matches:[89,90,91,92,93,94,95,96] },
  { key:"QF",  label:"Quarter-finals",matches:[97,98,99,100] },
  { key:"SF",  label:"Semi-finals",   matches:[101,102] },
  { key:"F",   label:"Final",         matches:[103] }
];
var KO_TOTAL = 31;

function cmpTeam(x,y){ return y.pts-x.pts || y.gd-x.gd || y.gf-x.gf || x.team.localeCompare(y.team); }

function computeTables(preds){
  var tables = {};
  Object.keys(GROUPS).forEach(function(g){
    var stat = {};
    GROUPS[g].forEach(function(t){ stat[t]={team:t,group:g,pts:0,gf:0,ga:0,gd:0,played:0}; });
    MATCHES.filter(function(m){ return m.group===g; }).forEach(function(m){
      var p = preds[m.id]; if (!p || p.h==="" || p.a==="") return;
      var h=parseInt(p.h,10), a=parseInt(p.a,10), H=stat[m.home], A=stat[m.away];
      H.gf+=h; H.ga+=a; A.gf+=a; A.ga+=h; H.played++; A.played++;
      if (h>a) H.pts+=3; else if (h<a) A.pts+=3; else { H.pts++; A.pts++; }
    });
    var arr = GROUPS[g].map(function(t){ var s=stat[t]; s.gd=s.gf-s.ga; return s; });
    arr.sort(cmpTeam);
    tables[g]=arr;
  });
  return tables;
}
function assignThirds(qualGroups){
  var slots=[74,77,79,80,81,82,85,87], assign={}, used={};
  var order=slots.slice().sort(function(a,b){
    function n(s){ return THIRD_CLUSTERS[s].filter(function(g){return qualGroups.indexOf(g)>=0;}).length; }
    return n(a)-n(b);
  });
  function solve(i){
    if (i===order.length) return true;
    var slot=order[i];
    var dom=THIRD_CLUSTERS[slot].filter(function(g){ return qualGroups.indexOf(g)>=0 && !used[g]; });
    for (var k=0;k<dom.length;k++){ assign[slot]=dom[k]; used[dom[k]]=true; if (solve(i+1)) return true; used[dom[k]]=false; delete assign[slot]; }
    return false;
  }
  if (solve(0)) return assign;
  var fb={}, u={}; slots.forEach(function(s){ for (var j=0;j<qualGroups.length;j++){ if(!u[qualGroups[j]]){ fb[s]=qualGroups[j]; u[qualGroups[j]]=true; break; } } });
  return fb;
}
function r32team(ref, tables, thirdBySlot){
  if (ref.t==="W")  return tables[ref.g][0].team;
  if (ref.t==="RU") return tables[ref.g][1].team;
  if (ref.t==="3")  return thirdBySlot[ref.slot] || null;
  return null;
}
/* Returns { tables, qualThirds, thirdBySlot, teams:{matchNo:[a,b]} } and prunes invalid winners in place. */
function computeBracket(preds, winners, koOpp){
  var tables = computeTables(preds);
  var thirds = Object.keys(GROUPS).map(function(g){ return tables[g][2]; }).slice().sort(cmpTeam);
  var qualThirds = thirds.slice(0,8);
  var qualGroups = qualThirds.map(function(s){ return s.group; });
  var slotAssign = assignThirds(qualGroups);
  var thirdBySlot = {}; Object.keys(slotAssign).forEach(function(s){ thirdBySlot[s]=tables[slotAssign[s]][2].team; });

  var teams = {}, defByNo = {};
  R32DEF.forEach(function(d){ defByNo[d.m]=d; teams[d.m]=[ r32team(d.a,tables,thirdBySlot), r32team(d.b,tables,thirdBySlot) ]; });
  // Correct R32 ties from the real fixtures BEFORE progression/pruning, so a
  // corrected third that actually advanced isn't pruned out of later rounds.
  if (koOpp) applyRealR32(teams, koOpp);
  ALLNOS.forEach(function(no){
    if (no>88){ var d=LATERMAP[no]; teams[no]=[ winners[d.a]||null, winners[d.b]||null ]; }
    var w=winners[no];
    if (w!=null){ var t=teams[no]; if (!t || (t[0]!==w && t[1]!==w)) delete winners[no]; }
  });
  return { tables:tables, qualThirds:qualThirds, thirdBySlot:thirdBySlot, teams:teams };
}
function koPicked(winners){ var n=0; ALLNOS.forEach(function(no){ if(winners[no]) n++; }); return n; }

/* --- Real-results helpers: knockout rounds only open once results.json reaches them --- */
function actualGroupPreds(R){
  var preds = {};
  if(!R) return preds;
  if(!R._pairIndex) indexResults(R);
  MATCHES.forEach(function(m){
    var act = R._pairIndex[pairKey(m.home, m.away)]; if(!act) return;
    var ah, aa;
    if (normName(act.home)===normName(m.home)){ ah=act.h; aa=act.a; } else { ah=act.a; aa=act.h; }
    preds[m.id] = { h:String(ah), a:String(aa) };
  });
  return preds;
}
function openRounds(R){
  var open = { R32:false, R16:false, QF:false, SF:false, F:false };
  if(!R) return open;
  var adv = R.advancers || {}, kf = R.koFixtures || {};
  // A round opens once its qualifiers are known OR the real draw has produced at
  // least one tie for it, so people can predict decided ties without waiting for
  // the whole previous round to finish. Undecided ties show as "To be decided".
  if((R.qualifiedR32||[]).length === 32) open.R32 = true;
  if((adv.R32||[]).length === 16 || (kf.R16||[]).length) open.R16 = true;
  if((adv.R16||[]).length === 8  || (kf.QF ||[]).length) open.QF  = true;
  if((adv.QF ||[]).length === 4  || (kf.SF ||[]).length) open.SF  = true;
  if((adv.SF ||[]).length === 2  || (kf.F  ||[]).length) open.F   = true;
  return open;
}
/* Round-by-round resolve: feeds actual group scores in, then progressively
   matches each round's advancers to deduce which team won each match number. */
function actualBracket(R){
  var gp = actualGroupPreds(R);
  var koOpp = (R && R._koOppR32) || {};
  var winners = {};
  ['R32','R16','QF','SF','F'].forEach(function(key){
    var br = computeBracket(gp, winners, koOpp);
    var round = null; KO_ROUNDS.forEach(function(r){ if(r.key===key) round=r; });
    var adv = (R && R.advancers && R.advancers[key]) || [];
    if(!adv.length) return;
    var advSet = {}; adv.forEach(function(t){ advSet[normName(t)]=1; });
    round.matches.forEach(function(no){
      var t = br.teams[no] || [null,null];
      if (t[0] && advSet[normName(t[0])]) winners[no] = t[0];
      else if (t[1] && advSet[normName(t[1])]) winners[no] = t[1];
    });
  });
  return computeBracket(gp, winners, koOpp);
}

/* --------------------------- leaderboard --------------------------- */
/* Points config — EDIT HERE. Knockout values aren't in the original rules,
   so these are sensible defaults; change them to whatever you agree. */
var SCORING = {
  exact: 5, result: 2,        // group score: exact / correct result
  qualifier: 10,              // each correct team reaching the Round of 32
  winner: 25, topScorer: 25,  // pre-tournament winner / Golden Boot
  koExact: 5, koResult: 2,    // knockout 90-min score: exact / correct result
  koPerCorrect: 2             // each correct team advancing (stacks with the score points)
};
function normName(s){ return String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9]/g,""); }
function pairKey(a,b){ return [normName(a),normName(b)].sort().join("|"); }

function indexResults(R){
  var idx = {};
  (R.groupScores||[]).forEach(function(g){ idx[pairKey(g.home,g.away)] = g; });
  R._pairIndex = idx;
  var kidx = {};
  (R.koScores||[]).forEach(function(g){ kidx[pairKey(g.home,g.away)] = g; });
  R._koPairIndex = kidx;
  // Real R32 matchup → opponent lookup, used to correct the knockout ties (the
  // app's third-placed template can't reproduce FIFA's official assignment).
  var koOpp = {};
  ((R.koFixtures && R.koFixtures.R32) || []).forEach(function(f){
    koOpp[normName(f.home)] = f.away; koOpp[normName(f.away)] = f.home;
  });
  R._koOppR32 = koOpp;
  // Qualifiers (the 32 R32 teams): prefer the real R32 fixtures, else ESPN's
  // qualifiedR32, else derive from the final standings once the groups are done.
  if (!R.qualifiedR32 || R.qualifiedR32.length !== 32){
    var realSet = {}; ((R.koFixtures && R.koFixtures.R32) || []).forEach(function(f){ realSet[f.home]=1; realSet[f.away]=1; });
    var realTeams = Object.keys(realSet);
    if (realTeams.length === 32) R.qualifiedR32 = realTeams.sort();
    else if ((R.groupScores||[]).length >= TOTAL) R.qualifiedR32 = derivedQualifiedR32(R);
  }
  return R;
}
// Correct each R32 tie's third-placed team using the real fixtures: every "3"
// slot is anchored by a group winner/runner-up the app already gets right, so we
// swap in that anchor's real opponent.
function applyRealR32(teams, opp){
  opp = opp || {};
  if (!Object.keys(opp).length) return teams;
  R32DEF.forEach(function(d){
    var t = teams[d.m]; if(!t) return;
    var aThird = d.a.t==="3", bThird = d.b.t==="3";
    if(!aThird && !bThird) return;
    var anchor = aThird ? t[1] : t[0];
    var realOpp = anchor ? opp[normName(anchor)] : null;
    if(!realOpp) return;
    if(aThird) teams[d.m] = [realOpp, t[1]]; else teams[d.m] = [t[0], realOpp];
  });
  return teams;
}
function derivedQualifiedR32(R){
  var gp = actualGroupPreds(R);
  var br = computeBracket(gp, {});
  var q = [];
  Object.keys(GROUPS).forEach(function(g){ q.push(br.tables[g][0].team, br.tables[g][1].team); });
  br.qualThirds.forEach(function(s){ q.push(s.team); });
  return q;
}
function scoreEntry(entry, R){
  var preds = entry.predictions||{}, w = entry.knockout||{}, ks = entry.koScores||{};
  var bd = { group:0, qualifiers:0, ko:0, koScore:0, winner:0, topScorer:0 };

  MATCHES.forEach(function(m){
    var p = preds[m.id]; if(!p || p.h===""||p.a==="") return;
    var act = R._pairIndex[pairKey(m.home,m.away)]; if(!act) return;
    var ah, aa;
    if (normName(act.home)===normName(m.home)){ ah=+act.h; aa=+act.a; } else { ah=+act.a; aa=+act.h; }
    var ph=+p.h, pa=+p.a;
    if (ph===ah && pa===aa) bd.group += SCORING.exact;
    else if (Math.sign(ph-pa)===Math.sign(ah-aa)) bd.group += SCORING.result;
  });

  if (R.qualifiedR32 && R.qualifiedR32.length===32){
    var br = computeBracket(preds, {});
    var predQ = {};
    Object.keys(GROUPS).forEach(function(g){ predQ[normName(br.tables[g][0].team)]=1; predQ[normName(br.tables[g][1].team)]=1; });
    br.qualThirds.forEach(function(s){ predQ[normName(s.team)]=1; });
    R.qualifiedR32.forEach(function(t){ if(predQ[normName(t)]) bd.qualifiers += SCORING.qualifier; });
  }

  if (R.champion && entry.winner && normName(entry.winner)===normName(R.champion)) bd.winner += SCORING.winner;

  if (R.topScorers && R.topScorers.length && entry.topScorer){
    var maxG = R.topScorers[0].goals;
    var leaders = R.topScorers.filter(function(s){ return s.goals===maxG; }).map(function(s){ return normName(s.name); });
    if (leaders.indexOf(normName(entry.topScorer))>=0) bd.topScorer += SCORING.topScorer;
  }

  // Actual knockout bracket (real teams + match numbers), used to align each
  // person's per-match score/advancer pick to the real tie.
  var abr = (R._koPairIndex || R.advancers) ? actualBracket(R) : null;
  KO_ROUNDS.forEach(function(r){
    var adv = (R.advancers && R.advancers[r.key]) || [];
    var advN = {}; adv.forEach(function(t){ advN[normName(t)]=1; });
    r.matches.forEach(function(no){
      // +2 for the correct team advancing (extra time / penalties decide draws)
      if (adv.length){ var t=w[no]; if(t && advN[normName(t)]) bd.ko += SCORING.koPerCorrect; }
      // 90-min scoreline: 5 exact / 2 correct result (stacks with the advancer point)
      var ps = ks[no]; if(!ps || ps.h===""||ps.a==="" || !abr) return;
      var teams = abr.teams[no] || [null,null]; if(!teams[0]||!teams[1]) return;
      var act = R._koPairIndex[pairKey(teams[0],teams[1])]; if(!act) return;
      var ah, aa;
      if (normName(act.home)===normName(teams[0])){ ah=+act.h; aa=+act.a; } else { ah=+act.a; aa=+act.h; }
      var ph=+ps.h, pa=+ps.a;
      if (ph===ah && pa===aa) bd.koScore += SCORING.koExact;
      else if (Math.sign(ph-pa)===Math.sign(ah-aa)) bd.koScore += SCORING.koResult;
    });
  });

  var total = bd.group+bd.qualifiers+bd.ko+bd.koScore+bd.winner+bd.topScorer;
  return { points: total, bd: bd };
}
function loadJSON(path){
  return fetch(path, { cache:"no-store" }).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; });
}

// Their predicted qualifiers (top 2 per group + best 8 third-placed), from group scores.
function waQualifierLines(preds){
  var L = [], total = 0;
  for (var id in preds){ var p=preds[id]; if (p && p.h!=="" && p.a!=="") total++; }
  if (!total) return L;
  var br = computeBracket(preds, {});
  L.push("*Teams through to the Round of 32*");
  Object.keys(GROUPS).forEach(function(g){ L.push(g + ": " + br.tables[g][0].team + ", " + br.tables[g][1].team); });
  var thirds = br.qualThirds.map(function(s){ return s.team; });
  if (thirds.length) L.push("Best 3rd-placed: " + thirds.join(", "));
  return L;
}
// One knockout round's predicted scorelines (+ who goes through on a draw).
function waKoRoundLines(round, koScores, winners){
  var lines = [];
  round.matches.forEach(function(no){
    var s = koScores[no], adv = winners[no];
    if (s && s.h!=="" && s.a!==""){
      var line = s.home + " " + s.h + " - " + s.a + " " + s.away;
      if (+s.h === +s.a && adv) line += " → " + adv + " go through";
      lines.push(line);
    } else if (adv){
      lines.push(adv + " to go through");
    }
  });
  return lines;
}
// scope: "all" (full list) or a knockout key (R32/R16/QF/SF/F) for a phase-only export.
function buildWhatsApp(entry, scope){
  var koKeys = { R32:1, R16:1, QF:1, SF:1, F:1 };
  scope = koKeys[scope] ? scope : "all";
  var name=entry.name, category=entry.category, preds=entry.predictions||{}, winners=entry.knockout||{}, koScores=entry.koScores||{};
  var L = [];
  L.push("⚽ *World Cup 2026 — Downham Town FC*");
  L.push("Entry: *" + name + "*" + (category==="Under 12" ? "  _(Under-12s)_" : ""));

  if (scope !== "all"){
    var round = null; KO_ROUNDS.forEach(function(r){ if(r.key===scope) round=r; });
    L.push(""); L.push("*" + round.label + " predictions — score after 90 mins*");
    var lines = waKoRoundLines(round, koScores, winners);
    if (lines.length) lines.forEach(function(x){ L.push(x); }); else L.push("_None predicted yet_");
    if (scope === "F" && winners[103]){ L.push(""); L.push("🏆 *Champion: " + winners[103] + "*"); }
    return L.join("\n");
  }

  L.push("");
  L.push("🏆 *Winner:* " + (entry.winner || "_(not chosen yet)_"));
  L.push("👟 *Top scorer:* " + (entry.topScorer || "_(not chosen yet)_"));

  var total = 0;
  for (var d=1; d<=3; d++){
    var day = MATCHES.filter(function(m){ return m.matchday===d; })
      .filter(function(m){ var p=preds[m.id]; return p&&p.h!==""&&p.a!==""; });
    if (!day.length) continue;
    L.push(""); L.push("*Matchday " + d + "*");
    day.forEach(function(m){ var p=preds[m.id]; L.push(m.home + " " + p.h + " - " + p.a + " " + m.away); total++; });
  }
  L.push("");
  L.push(total ? ("_" + total + " of " + TOTAL + " group matches predicted_") : "_No predictions filled in yet_");

  var ql = waQualifierLines(preds);
  if (ql.length){ L.push(""); ql.forEach(function(x){ L.push(x); }); }

  var anyKoScore = Object.keys(koScores).some(function(no){ var s=koScores[no]; return s && s.h!=="" && s.a!==""; });

    L.push(""); L.push("*— Knockout predictions (score after 90 mins) —*");
    KO_ROUNDS.forEach(function(r){

      if (lines.length){ L.push(""); L.push("*" + r.label + "*"); lines.forEach(function(x){ L.push(x); }); }
    });
    if (winners[103]){ L.push(""); L.push("🏆 *Champion: " + winners[103] + "*"); }
  }
  return L.join("\n");
}

function koAdvHtml(no, teamA, teamB){
  var s = state.koScores[no];

    var wteam = (+s.h > +s.a) ? teamA : teamB;

  }
  function btn(team){
    var sel = state.knockout[no]===team;
    return '<button type="button" class="advpick'+(sel?" win":"")+'" data-m="'+no+'" data-team="'+esc(team)+'">'+(FLAGS[team]||"")+' '+esc(team)+'</button>';
  }
  return '<div style="font-size:12px;font-weight:700;color:#b4690e;margin-bottom:5px;">Draw after 90′ — who goes through? (ET / penalties)</div>' +
    '<div class="flex g6">'+btn(teamA)+btn(teamB)+'</div>';
}
function koDecided(no){
  var s = state.koScores[no];
  return !!(s && s.h!=="" && s.a!=="" && state.knockout[no]);
}
function koReconcile(no){
  var s = state.koScores[no];
  if (!s || s.h===""||s.a===""){ delete state.knockout[no]; return; }
  if (+s.h > +s.a) state.knockout[no] = s.home;
  else if (+s.a > +s.h) state.knockout[no] = s.away;
  else if (state.knockout[no]!==s.home && state.knockout[no]!==s.away) delete state.knockout[no];
}
function updateKoPicked(){
  var round=null; KO_ROUNDS.forEach(function(r){ if(r.key===state.tab) round=r; });

  var el=document.getElementById("kopicks"); if(el) el.textContent = picked+" of "+round.matches.length+" decided";
}

  s[side]=v; state.koScores[no]=s;
  el.classList.toggle("filled", v!=="");
  koReconcile(no);

}

var MON_ABBR = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function todayStr(){ var d=new Date(); return d.getDate()+" "+MON_ABBR[d.getMonth()]; }
function matchDates(R){
  var seen={}, list=[];
  MATCHES.forEach(function(m){ if(!seen[m.date]){ seen[m.date]=1; list.push(m.date); } });
  var kf = (R && R.koFixtures) || {};
  ["R32","R16","QF","SF","F"].forEach(function(k){
    (kf[k]||[]).forEach(function(f){ if(f.date && !seen[f.date]){ seen[f.date]=1; list.push(f.date); } });
  });
  return list.sort(function(a,b){ return dkey(a)-dkey(b); });
}
function defaultDay(dates){
  var t=todayStr(); if(dates.indexOf(t)>=0) return t;
  var tk=dkey(t), up=null;
  dates.forEach(function(d){ if(up===null && dkey(d)>=tk) up=d; });
  return up || dates[dates.length-1];
}
function predOutcome(p, act, m){
  if(!p || p.h===""||p.a===""||!act) return {cls:"none"};
  var ah,aa;
  if(normName(act.home)===normName(m.home)){ ah=+act.h; aa=+act.a; } else { ah=+act.a; aa=+act.h; }
  var ph=+p.h, pa=+p.a;
  if(ph===ah && pa===aa) return {cls:"exact", pts:SCORING.exact};
  if(Math.sign(ph-pa)===Math.sign(ah-aa)) return {cls:"result", pts:SCORING.result};
  return {cls:"wrong"};
}
var DP_RANK={exact:0,result:1,wrong:2,none:3};
function dayMatchesHtml(date, preds, R){
  var ms = MATCHES.filter(function(m){ return m.date===date; })
    .sort(function(a,b){ return a.group.localeCompare(b.group); });
  var rank=DP_RANK, html='';
  ms.forEach(function(m){
    var act = R._pairIndex[pairKey(m.home,m.away)];
    var resultStr;
    if(act){
      var ah,aa;
      if(normName(act.home)===normName(m.home)){ ah=+act.h; aa=+act.a; } else { ah=+act.a; aa=+act.h; }
      resultStr = '<strong>'+ah+'–'+aa+'</strong> <span style="color:#1a7f37;font-weight:700;">FT</span>';
    } else { resultStr = '<span class="muted">not played yet</span>'; }

    var rows = preds.map(function(e){
      var p=(e.predictions||{})[m.id];
      var has = p && p.h!=="" && p.a!=="";
      return { name:e.name||"?", u12:e.category==="Under 12", has:has, score:has?(p.h+'–'+p.a):'—', oc:predOutcome(p,act,m) };
    }).sort(function(a,b){ return (rank[a.oc.cls]-rank[b.oc.cls]) || a.name.localeCompare(b.name); });

    var done = rows.filter(function(r){ return r.has; }).length;
    html += '<div class="ticket" style="padding:12px 14px;margin-bottom:10px;">' +
      '<div class="flex ac jb" style="gap:8px;margin-bottom:6px;">' +
        '<div style="font-weight:700;">'+(FLAGS[m.home]||"")+' '+esc(m.home)+' v '+esc(m.away)+' '+(FLAGS[m.away]||"")+'</div>' +
        '<div class="md-pill">Group '+m.group+'</div></div>' +
      '<div style="font-size:13px;margin-bottom:8px;">Result: '+resultStr+' <span class="muted">· '+done+'/'+rows.length+' predicted</span></div>' +
      '<div style="display:grid;gap:4px;font-size:13px;">';
    rows.forEach(function(r){
      var badge='';
      if(r.oc.cls==="exact") badge=' <span style="background:#d8f0dd;color:#1a7f37;border-radius:6px;padding:1px 6px;font-size:11px;font-weight:700;">exact +'+r.oc.pts+'</span>';
      else if(r.oc.cls==="result") badge=' <span style="background:#fbe6c8;color:#b4690e;border-radius:6px;padding:1px 6px;font-size:11px;font-weight:700;">+'+r.oc.pts+'</span>';
      html += '<div class="flex ac jb"'+(r.has?'':' style="opacity:.5;"')+'>' +
        '<span>'+esc(r.name)+(r.u12?' <span class="md-pill">U12</span>':'')+'</span>' +
        '<span style="font-weight:700;'+(r.oc.cls==="wrong"?'color:#9a8d70;':'')+'">'+esc(r.score)+badge+'</span></div>';
    });
    html += '</div></div>';
  });
  html += koDayHtml(date, preds, R);
  return html || '<p class="muted">No matches on this day.</p>';
}
// Knockout ties on a given day: everyone's 90-min score + who they have going through.
function koDayHtml(date, preds, R){
  var kf=(R&&R.koFixtures)||{}; var any=false;
  for(var k in kf){ if((kf[k]||[]).some(function(f){return f.date===date;})) any=true; }
  if(!any) return '';
  var abr=actualBracket(R);
  var roundOf={}; KO_ROUNDS.forEach(function(r){ r.matches.forEach(function(no){ roundOf[no]=r; }); });
  var pkToNo={};
  for(var no in roundOf){ var t=abr.teams[no]; if(t&&t[0]&&t[1]) pkToNo[pairKey(t[0],t[1])]=no; }
  var ties=[];
  ["R32","R16","QF","SF","F"].forEach(function(key){
    (kf[key]||[]).forEach(function(f){
      if(f.date!==date) return;
      var n=pkToNo[pairKey(f.home,f.away)]; if(!n) return;
      ties.push({no:+n, home:abr.teams[n][0], away:abr.teams[n][1], round:roundOf[n]});
    });
  });
  if(!ties.length) return '';
  ties.sort(function(a,b){ return a.no-b.no; });
  var rank=DP_RANK, html='';
  ties.forEach(function(tie){
    var no=tie.no, home=tie.home, away=tie.away, key=tie.round.key;
    var act=R._koPairIndex[pairKey(home,away)];
    var advs=(R.advancers&&R.advancers[key])||[]; var advActual=null;
    if(advs.some(function(t){return normName(t)===normName(home);})) advActual=home;
    else if(advs.some(function(t){return normName(t)===normName(away);})) advActual=away;
    var resultStr, ah, aa;
    if(act){
      if(normName(act.home)===normName(home)){ ah=+act.h; aa=+act.a; } else { ah=+act.a; aa=+act.h; }
      resultStr='<strong>'+ah+'–'+aa+'</strong> <span style="color:#1a7f37;font-weight:700;">90&prime;</span>'+(advActual?(' · '+esc(advActual)+' through'):'');
    } else { resultStr='<span class="muted">not played yet</span>'; }
    var rows=preds.map(function(e){
      var ks=(e.koScores||{})[no], pa=(e.knockout||{})[no];
      var has=ks&&ks.h!==""&&ks.a!=="";
      var score='—', oc={cls:"none"}, advOK=false;
      if(has){
        var ph,pp;
        if(normName(ks.home)===normName(home)){ ph=+ks.h; pp=+ks.a; } else { ph=+ks.a; pp=+ks.h; }
        score=ph+'–'+pp;
        if(act){
          if(ph===ah&&pp===aa) oc={cls:"exact",pts:SCORING.koExact};
          else if(Math.sign(ph-pp)===Math.sign(ah-aa)) oc={cls:"result",pts:SCORING.koResult};
          else oc={cls:"wrong"};
        }
      }
      if(advActual && pa && normName(pa)===normName(advActual)) advOK=true;
      return {name:e.name||"?", u12:e.category==="Under 12", has:has, score:score, adv:pa, oc:oc, advOK:advOK};
    }).sort(function(a,b){ return (rank[a.oc.cls]-rank[b.oc.cls])||a.name.localeCompare(b.name); });
    var done=rows.filter(function(r){return r.has;}).length;
    html+='<div class="ticket" style="padding:12px 14px;margin-bottom:10px;">' +
      '<div class="flex ac jb" style="gap:8px;margin-bottom:6px;">' +
        '<div style="font-weight:700;">'+(FLAGS[home]||"")+' '+esc(home)+' v '+esc(away)+' '+(FLAGS[away]||"")+'</div>' +
        '<div class="md-pill">'+esc(tie.round.label)+'</div></div>' +
      '<div style="font-size:13px;margin-bottom:8px;">Result: '+resultStr+' <span class="muted">· '+done+'/'+rows.length+' predicted</span></div>' +
      '<div style="display:grid;gap:4px;font-size:13px;">';
    rows.forEach(function(r){
      var badge='';
      if(r.oc.cls==="exact") badge=' <span style="background:#d8f0dd;color:#1a7f37;border-radius:6px;padding:1px 6px;font-size:11px;font-weight:700;">exact +'+r.oc.pts+'</span>';
      else if(r.oc.cls==="result") badge=' <span style="background:#fbe6c8;color:#b4690e;border-radius:6px;padding:1px 6px;font-size:11px;font-weight:700;">+'+r.oc.pts+'</span>';
      if(r.advOK) badge+=' <span style="background:#d8f0dd;color:#1a7f37;border-radius:6px;padding:1px 6px;font-size:11px;font-weight:700;">through +'+SCORING.koPerCorrect+'</span>';
      var advTxt = (r.has && r.adv) ? ' <span style="color:#9a8d70;font-weight:400;">→ '+esc(r.adv)+'</span>' : '';
      html += '<div class="flex ac jb"'+(r.has?'':' style="opacity:.5;"')+'>' +
        '<span>'+esc(r.name)+(r.u12?' <span class="md-pill">U12</span>':'')+'</span>' +
        '<span style="font-weight:700;'+(r.oc.cls==="wrong"?'color:#9a8d70;':'')+'">'+esc(r.score)+advTxt+badge+'</span></div>';
    });
    html += '</div></div>';
  });
  return html;
}
function openDailyModal(preds, R){
  if(!preds || !preds.length) return;
  var dates=matchDates(R), sel=defaultDay(dates), today=todayStr();
  var opts=dates.map(function(d){ return '<option value="'+esc(d)+'"'+(d===sel?' selected':'')+'>'+esc(d)+(d===today?' (today)':'')+'</option>'; }).join("");
  var html='<div class="flex ac jb" style="margin-bottom:10px;"><div class="display" style="font-size:20px;color:var(--red);">Predictions by day</div><button class="link" id="dp-close">Close</button></div>' +
    '<select class="field" id="dp-day" style="margin-bottom:12px;">'+opts+'</select>' +
    '<div id="dp-body" style="overflow:auto;"></div>';
  var ov=document.createElement("div"); ov.className="overlay";
  var sheet=document.createElement("div"); sheet.className="sheet pop"; sheet.innerHTML=html;
  ov.appendChild(sheet); document.body.appendChild(ov);
  function close(){ document.body.removeChild(ov); }
  ov.addEventListener("click", function(ev){ if(ev.target===ov) close(); });
  sheet.querySelector("#dp-close").addEventListener("click", close);
  var bodyEl=sheet.querySelector("#dp-body"), daySel=sheet.querySelector("#dp-day");
  function draw(){ bodyEl.innerHTML=dayMatchesHtml(daySel.value, preds, R); }
  daySel.addEventListener("change", draw);
  draw();
}

/* --------------------------- organiser import --------------------------- */
function parsePredictions(raw){
  var byKey={}; MATCHES.forEach(function(m){ byKey[m.matchday+"|"+m.home+"|"+m.away]=m; });
  var SCORE_RE=/^(.*?) (\d+)\s*-\s*(\d+) (.*)$/;
  var blocks=raw.split("⚽").map(function(b){return b.trim();}).filter(function(b){return /Entry:/.test(b);});
  var entries=[], notes=[];
  blocks.forEach(function(b){
    var lines=b.split("\n").map(function(l){return l.trim();});
    var name=((b.match(/Entry:\s*\*(.+?)\*/)||[])[1]||"?").trim();
    var winner=((b.match(/Winner:\*?\s*(.+)/)||[])[1]||"").replace(/_.*/,"").trim();
    var topScorer=((b.match(/Top scorer:\*?\s*(.+)/)||[])[1]||"").replace(/_.*/,"").trim();
    var predictions={}, knockout={}, md=0, skip=false, unmatched=0;
    lines.forEach(function(ln){
      var mdm=ln.match(/^\*Matchday (\d)\*/); if(mdm){ md=+mdm[1]; skip=false; return; }
      if(/Teams through to the Round of 32/.test(ln)){ skip=true; return; }
      if(/group matches predicted/.test(ln)){ md=0; return; }
      if(skip || !md) return;
      var sm=ln.match(SCORE_RE); if(!sm) return;
      var home=sm[1].trim(), h=sm[2], a=sm[3], away=sm[4].trim();
      var m=byKey[md+"|"+home+"|"+away], H=h, A=a;
      if(!m){ m=byKey[md+"|"+away+"|"+home]; H=a; A=h; }
      if(!m){ unmatched++; return; }
      predictions[m.id]={h:H,a:A};
    });
    var filled=Object.keys(predictions).length;
    entries.push({ name:name, category:"Adult", winner:winner, topScorer:topScorer, predictions:predictions, knockout:knockout });
    notes.push(name+": "+filled+"/72 scores"+(winner?", winner "+winner:"")+(topScorer?", top scorer "+topScorer:"")+(unmatched?(" — ⚠ "+unmatched+" lines unmatched"):""));
  });
  return { entries:entries, notes:notes };
}

function showOrganiser(){
  state.screen="organiser";
  app.innerHTML = '<div class="wrapw pop" style="max-width:620px;margin:0 auto;padding:18px 14px 60px;">' +
      '<div class="flex ac jb"><div class="display" style="font-size:22px;color:var(--red);">Import predictions</div>' +
      '<button class="link" id="og-back">← back</button></div>' +
      '<p style="font-size:14px;margin-top:8px;line-height:1.5;">Paste one or more WhatsApp entries below (you can paste several at once). They\'ll be parsed and merged into a <code>predictions.json</code> you commit to the repo.</p>' +
      '<textarea class="field" id="og-in" style="margin-top:12px;min-height:160px;font-size:13px;white-space:pre;" placeholder="Paste WhatsApp message(s) here…"></textarea>' +
      '<button class="btn btn-red" id="og-parse" style="width:100%;margin-top:10px;padding:12px;">Parse messages</button>' +
      '<div id="og-out" style="margin-top:14px;"></div>' +
    '</div>';
  document.getElementById("og-back").addEventListener("click", showWelcome);
  document.getElementById("og-parse").addEventListener("click", function(){
    var raw=document.getElementById("og-in").value;
    var res=parsePredictions(raw);
    var out=document.getElementById("og-out");
    if(!res.entries.length){ out.innerHTML='<p class="muted">No entries found. Make sure each message includes the "Entry: *Name*" line.</p>'; return; }

    loadJSON("predictions.json").then(function(existing){
      existing = Array.isArray(existing) ? existing.filter(function(e){ return e && e.name && e.name!=="Sample Entry"; }) : [];
      var byName={}; existing.forEach(function(e){ byName[normName(e.name)]=e; });
      var added=0, updated=0;
      res.entries.forEach(function(e){ var k=normName(e.name); if(byName[k]) updated++; else added++; byName[k]=e; });
      var merged=Object.keys(byName).map(function(k){ return byName[k]; }).sort(function(a,b){ return (a.name||"").localeCompare(b.name||""); });
      var json=JSON.stringify(merged,null,2)+"\n";

      var html='<div class="ticket" style="padding:12px 14px;font-size:13px;"><div style="font-weight:700;margin-bottom:6px;">Parsed '+res.entries.length+' entry(ies) — '+added+' new, '+updated+' updated</div><ul style="margin:0;padding-left:18px;">'+
        res.notes.map(function(n){return '<li>'+esc(n)+'</li>';}).join("")+'</ul>'+
        '<p class="muted" style="font-size:12px;margin-top:8px;">Merged file now has '+merged.length+' total ent(ies).</p></div>';
      html+='<div class="flex g8" style="margin-top:10px;">'+
        '<button class="btn btn-red" id="og-dl" style="flex:1;padding:12px;">⬇ Download predictions.json</button>'+
        '<button class="btn btn-ghost" id="og-copy" style="flex:1;padding:12px;">Copy JSON</button></div>';
      html+='<textarea class="field" id="og-json" readonly style="margin-top:10px;min-height:160px;font-size:12px;white-space:pre;"></textarea>';
      out.innerHTML=html;
      document.getElementById("og-json").value=json;
      document.getElementById("og-dl").addEventListener("click", function(){
        var blob=new Blob([json],{type:"application/json"}); var url=URL.createObjectURL(blob);
        var a=document.createElement("a"); a.href=url; a.download="predictions.json"; a.click(); setTimeout(function(){URL.revokeObjectURL(url);},1500);
      });
      document.getElementById("og-copy").addEventListener("click", function(){ var btn=this; copyText(json).then(function(ok){ btn.textContent=ok?"Copied ✓":"Select & copy"; setTimeout(function(){btn.textContent="Copy JSON";},2000); }); });
    });
  });
}

document.getElementById("home-crest").addEventListener("click", function(){ persistNow(); showWelcome(); });
document.getElementById("home-title").addEventListener("click", function(){ persistNow(); showWelcome(); });
showWelcome();
